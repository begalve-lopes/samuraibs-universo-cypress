name: Cypress E2E Tests

on:
  workflow_dispatch:

jobs:
  cypress-tests:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Debug structure
        run: |
          ls -la
          ls -la apps/ 2>/dev/null || echo "No apps folder"
          ls -la web/ 2>/dev/null || echo "No web folder"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Start API
        run: |
          # Try different possible start commands
          if grep -q '"start":' package.json; then
            yarn start &
          elif [ -f "server.js" ]; then
            node server.js &
          else
            echo "No API start script found"
          fi

      - name: Start Web App
        run: |
          if [ -d "web" ]; then
            cd web && yarn start &
          else
            echo "Web directory not found"
            exit 1
          fi

      - name: Wait for services
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
        with:
          record: true
          parallel: true
          group: UI-Chrome
          wait-on: http://localhost:3000
