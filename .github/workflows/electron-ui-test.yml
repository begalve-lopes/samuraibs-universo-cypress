name: Cypress E2E Tests

on:
  workflow_dispatch:

jobs:
  cypress-tests:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3]

    steps:
      - name: Checkout test repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      # Clone the web application repository (público)
      - name: Checkout Web Application
        uses: actions/checkout@v6
        with:
          repository: qaninja/samuraibs-web  # Substitua pelo owner correto
          path: web
          # Não precisa de token para repositórios públicos

      # Install and build web app
      - name: Setup Web Application
        working-directory: web
        run: |
          yarn install --frozen-lockfile
          yarn build
          
      # Start web app in background
      - name: Start Web Application
        working-directory: web
        run: |
          yarn start &
          sleep 10
          
      # Install test dependencies
      - name: Install test dependencies
        run: yarn install --frozen-lockfile

      # Wait for web app to be ready
      - name: Wait for Web App
        run: |
          npx wait-on http://localhost:3000 --timeout 120000
          
      # Run Cypress tests
      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
        with:
          record: true
          parallel: true
          group: UI-Chrome
          wait-on: http://localhost:3000
