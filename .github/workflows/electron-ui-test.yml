name: Cypress E2E Tests

on:
  workflow_dispatch:

jobs:
  cypress-tests:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Show package.json scripts
        run: |
          echo "=== Full package.json content ==="
          cat package.json
          echo ""
          echo "=== Available scripts ==="
          cat package.json | jq -r '.scripts | keys[]' 2>/dev/null || cat package.json | grep -A 50 '"scripts"'

      - name: Try to start and capture output
        run: |
          # Try starting with different methods and capture everything
          echo "Attempting to start application..."
          
          # Method 1: Direct yarn start with output capture
          yarn start &> start-output.log &
          PID=$!
          
          echo "Started with PID: $PID"
          sleep 10
          
          # Check if process is still alive
          if kill -0 $PID 2>/dev/null; then
            echo "✅ Process is still running"
            kill $PID 2>/dev/null
          else
            echo "❌ Process died immediately"
          fi
          
          echo "=== Output captured ==="
          cat start-output.log
          
          # Method 2: Try to run in foreground briefly to see error
          echo ""
          echo "=== Running start command in foreground (5 second timeout) ==="
          timeout 5 yarn start || echo "Command exited with code: $?"
          
      - name: Check for common issues
        run: |
          echo "=== Checking for common issues ==="
          
          # Check if there's a build step needed
          if grep -q '"build"' package.json; then
            echo "Build script found, attempting build..."
            yarn build || echo "Build failed"
          fi
          
          # Check what's in the current directory
          echo ""
          echo "=== Current directory contents ==="
          ls -la
          
          # Check if there's a server.js or index.js
          echo ""
          echo "=== Looking for entry points ==="
          ls -la server.js index.js app.js main.js 2>/dev/null || echo "No common entry points found"
          
          # Check for configuration files
          echo ""
          echo "=== Configuration files ==="
          ls -la *.config.js .env* 2>/dev/null || echo "No config files found"

      - name: Try alternative start methods
        run: |
          echo "=== Trying alternative start methods ==="
          
          # Try node directly if there's a server file
          if [ -f "server.js" ]; then
            echo "Found server.js, trying to run directly..."
            timeout 5 node server.js || echo "node server.js failed"
          fi
          
          if [ -f "index.js" ]; then
            echo "Found index.js, trying to run directly..."
            timeout 5 node index.js || echo "node index.js failed"
          fi
          
          # Check if it's a Next.js app
          if [ -f "next.config.js" ]; then
            echo "Next.js app detected, trying next start..."
            npx next start &> next-output.log &
            sleep 5
            cat next-output.log
          fi
          
          # Check if it's a React app (Create React App)
          if [ -f "src/index.js" ] || [ -f "src/App.js" ]; then
            echo "React app detected, trying react-scripts start..."
            timeout 10 npx react-scripts start || echo "react-scripts start failed"
          fi
